name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh
      - name: Setup Python
        run: uv python install 3.11 && uv venv .venv
      - name: Sync dependencies
        # Install the project (with the [test] extra) and the
        # PEP 735 ``dev`` dependency-group (pytest-httpx, pdoc, etc.).
        # PEP 735 is the supported replacement for the deprecated
        # [tool.uv] dev-dependencies table.
        run: uv pip install -e ".[test]" --group dev
      - name: Lint
        run: uv run ruff check . && uv run ruff format --check .
      - name: Test
        run: uv run pytest tests/ -v
      - name: Generate API docs (pdoc)
        run: uv run pdoc backend/ -o docs/api/ --docformat google
      - name: Check docstring coverage
        run: |
          uv pip install interrogate
          uv run interrogate -v --ignore-nested-functions --fail-under 85 backend/