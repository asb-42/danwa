# Example: Cloud LLM profile via OpenRouter
# Copy this file and rename (remove "-example") to activate.
# Set the API key as an environment variable before starting the backend.

id: openrouter-example
name: Example Cloud Model via OpenRouter
provider: openrouter
model: anthropic/claude-3.5-sonnet        # or openai/gpt-4o, google/gemini-pro, etc.
api_base: https://openrouter.ai/api/v1
api_key_env: OPENROUTER_API_KEY           # name of the env var holding your API key
max_tokens: 4096
temperature: 0.7
timeout: 120
cost_per_1k_input: 0.003
cost_per_1k_output: 0.015
